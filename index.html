<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>区域气象监测可视化系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 高德地图 JS API -->
<script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=0a6f6321ba8df4839aec4c8277f2f556"></script>
<!-- 高德地图 UI 组件库（可选，用于工具条、缩放控件等） -->
<script type="text/javascript" src="https://webapi.amap.com/ui/1.1/main.js"></script>
    <style>
        body.modal-open { overflow: hidden; }
        .transition-smooth { transition: all 0.2s ease-in-out; }
        canvas { max-width: 100%; height: auto; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-md sticky top-0 z-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <svg class="h-8 w-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                    <h1 class="text-xl font-bold text-gray-800">区域气象监测可视化系统</h1>
                </div>
                <div id="auth-buttons" class="flex space-x-3">
                    <button id="show-login-modal" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">登录</button>
                    <button id="show-register-modal-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-lg">注册</button>
                </div>
                <div id="user-info" class="hidden items-center space-x-3">
                    <span class="text-gray-700">欢迎，<span id="user-name" class="font-semibold"></span></span>
                    <span id="user-role" class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full"></span>
                    <button id="logout-btn" class="text-red-500 hover:text-red-700 text-sm border border-red-300 px-3 py-1 rounded-lg">退出</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="error-message" class="mb-4"></div>
        <div id="success-message" class="mb-4"></div>

        <!-- 普通用户视图 -->
        <div id="user-views" class="space-y-8">
            <!-- 气象数据检索 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                    气象数据检索
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">监测区域</label>
                        <select id="region-select" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                            <option value="">请先登录</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">起始时间</label>
                        <input type="date" id="start-time" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">结束时间</label>
                        <input type="date" id="end-time" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <button id="search-weather" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg flex items-center justify-center">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                            查询
                        </button>
                    </div>
                </div>
            </div>

            <!-- 气象记录表格 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-3">气象记录列表</h2>
                <div id="weather-table-container" class="overflow-x-auto">
                    <div class="text-center text-gray-400 py-8">请选择区域并点击查询</div>
                </div>
            </div>

            <!-- 温度趋势图 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-3">温度变化趋势图</h2>
                <canvas id="temperature-chart" width="800" height="300" style="width:100%; height:auto; max-height:320px" class="border rounded-lg bg-gray-50"></canvas>
            </div>

            <!-- 按名称查询区域 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-3">按名称查询区域</h2>
                <div class="flex gap-2">
                    <input type="text" id="search-region-name" placeholder="输入区域名称，如 北京" class="flex-1 border rounded-lg px-3 py-2">
                    <button id="search-region-by-name" class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-lg">查询</button>
                </div>
                <div id="region-detail-result" class="mt-3 text-sm text-gray-600"></div>
            </div>

            <!-- 手动添加气象数据 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-3">手动添加气象数据</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <select id="add-region-id" class="border rounded-lg px-3 py-2">
                        <option value="">选择区域</option>
                    </select>
                    <input type="datetime-local" id="add-timestamp" class="border rounded-lg px-3 py-2">
                    <input type="number" step="0.1" id="add-temp" placeholder="温度(°C)" class="border rounded-lg px-3 py-2">
                    <input type="number" step="0.1" id="add-humidity" placeholder="湿度(%)" class="border rounded-lg px-3 py-2">
                    <input type="number" step="0.1" id="add-wind-speed" placeholder="风速(m/s)" class="border rounded-lg px-3 py-2">
                    <input type="text" id="add-wind-dir" placeholder="风向" class="border rounded-lg px-3 py-2">
                    <input type="number" step="0.1" id="add-precip" placeholder="降水量(mm)" class="border rounded-lg px-3 py-2">
                    <button id="add-weather-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">提交数据</button>
                </div>
            </div>

            <!-- 地图占位 -->
          <div class="bg-white rounded-xl shadow-md p-4">
    <h2 class="text-lg font-semibold mb-2">监测区域地图</h2>
    <!-- 位置坐标显示 -->
    <div id="position-info" class="mb-2 text-sm text-gray-600 hidden">
        <span>当前位置：</span>
        <span id="current-lng">116.397428</span>°E, 
        <span id="current-lat">39.90923</span>°N
        <button id="locate-me" class="ml-2 text-blue-600 hover:text-blue-800 underline text-xs">📍 定位我</button>
    </div>
    <div id="map-container" class="w-full h-64 bg-gray-200 rounded-lg flex items-center justify-center text-gray-500">
        🗺️ 地图加载区域（可接入 Leaflet / 高德）
    </div>
    <!-- 搜索框 -->
    <div class="mt-2 flex gap-2">
        <input type="text" id="search-position" placeholder="搜索地点（如：北京）" class="flex-1 border rounded-lg px-3 py-1 text-sm">
        <button id="search-position-btn" class="bg-blue-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-blue-600">搜索</button>
    </div>
    <p class="text-xs text-gray-400 mt-1">* 点击地图查看坐标，支持地理编码搜索</p>
</div>

        <!-- 管理员面板 -->
        <div id="admin-panel" class="hidden mt-8 space-y-8">
            <div class="border-t-2 border-blue-200 pt-6">
                <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                    管理员控制台
                </h2>
            </div>
            <!-- 用户管理 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h3 class="text-lg font-semibold mb-3">用户管理</h3>
                <div id="users-list-container">
                    <button id="refresh-users-btn" class="mb-3 bg-indigo-100 text-indigo-700 px-3 py-1 rounded-md text-sm hover:bg-indigo-200">刷新用户列表</button>
                    <div id="users-list" class="overflow-x-auto">加载中...</div>
                </div>
            </div>
            <!-- 区域管理 -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h3 class="text-lg font-semibold mb-3">区域列表</h3>
                <div id="regions-list-container">
                    <button id="refresh-regions-btn" class="mb-3 bg-indigo-100 text-indigo-700 px-3 py-1 rounded-md text-sm hover:bg-indigo-200">刷新区域</button>
                    <div id="regions-list" class="grid grid-cols-1 md:grid-cols-2 gap-3">加载中...</div>
                </div>
                <div class="mt-4 p-3 bg-gray-50 rounded-lg">
                    <h4 class="font-medium text-gray-700">新建区域（管理员）</h4>
                    <div class="flex gap-2 mt-2">
                        <input type="text" id="new-region-name" placeholder="区域名称（如 上海）" class="border rounded px-3 py-2 flex-1">
                        <button id="create-region-btn" class="bg-green-500 text-white px-4 py-2 rounded text-sm hover:bg-green-600">创建</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 登录模态框 -->
    <div id="login-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 relative">
            <button class="close-modal absolute top-3 right-3 text-gray-400 hover:text-gray-600 text-2xl" data-modal="login-modal">&times;</button>
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">登录账户</h2>
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">用户名</label>
                    <input type="text" id="login-username" class="w-full border border-gray-300 rounded-lg px-3 py-2" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">密码</label>
                    <input type="password" id="login-password" class="w-full border border-gray-300 rounded-lg px-3 py-2" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg">登录</button>
            </form>
            <p class="text-center text-sm text-gray-500 mt-4">还没有账号？<a href="#" id="show-register" class="text-blue-600 hover:underline">立即注册</a></p>
        </div>
    </div>

    <!-- 注册模态框 -->
    <div id="register-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 relative">
            <button class="close-modal absolute top-3 right-3 text-gray-400 hover:text-gray-600 text-2xl" data-modal="register-modal">&times;</button>
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">注册新账号</h2>
            <form id="register-form">
                <div class="mb-3">
                    <input type="text" id="reg-username" placeholder="用户名" class="w-full border rounded-lg px-3 py-2" required>
                </div>
                <div class="mb-3">
                    <input type="email" id="reg-email" placeholder="邮箱" class="w-full border rounded-lg px-3 py-2" required>
                </div>
                <div class="mb-3">
                    <input type="password" id="reg-password" placeholder="密码（至少6位）" class="w-full border rounded-lg px-3 py-2" required>
                </div>
                <div class="mb-4">
                    <input type="password" id="reg-confirm-password" placeholder="确认密码" class="w-full border rounded-lg px-3 py-2" required>
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg">注册</button>
            </form>
            <p class="text-center text-sm mt-3">已有账号？<a href="#" id="goto-login" class="text-blue-600 hover:underline">去登录</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
