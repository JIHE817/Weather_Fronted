<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员控制台 - 区域气象监测系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
        .admin-tab-btn {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .admin-tab-btn.active {
            font-weight: 600;
        }
        .admin-tab-content {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .transition-smooth { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body>
    <div class="container">
        <div class="flex flex-col lg:flex-row gap-6">
            <!-- ===== 左侧主内容 ===== -->
            <div class="flex-1">
                <div class="bg-white rounded-xl shadow-md p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">⚙️ 管理员控制台</h1>
                        <a href="index.html" class="text-blue-600 hover:underline">← 返回首页</a>
                    </div>

                    <div id="error-message" class="mb-4"></div>
                    <div id="success-message" class="mb-4"></div>

                    <!-- 标签页导航 -->
                    <div class="flex border-b border-gray-200 mb-6">
                        <button class="admin-tab-btn active flex-1 py-3 px-4 text-sm font-medium text-blue-600 border-b-2 border-blue-600 bg-blue-50 hover:bg-blue-100 transition" data-tab="users">
                            👥 用户管理
                        </button>
                        <button class="admin-tab-btn flex-1 py-3 px-4 text-sm font-medium text-gray-600 border-b-2 border-transparent hover:bg-gray-50 hover:text-gray-800 transition" data-tab="regions">
                            🗺️ 区域列表
                        </button>
                        <button class="admin-tab-btn flex-1 py-3 px-4 text-sm font-medium text-gray-600 border-b-2 border-transparent hover:bg-gray-50 hover:text-gray-800 transition" data-tab="raster">
                            📤 上传栅格数据
                        </button>
                    </div>

                    <!-- 用户管理 -->
                    <div id="admin-tab-users" class="admin-tab-content">
                        <h3 class="text-lg font-semibold mb-3">用户管理</h3>
                        <button id="refresh-users-btn" class="mb-3 bg-indigo-100 text-indigo-700 px-3 py-1 rounded-md text-sm hover:bg-indigo-200">刷新用户列表</button>
                        <div id="users-list" class="overflow-x-auto">加载中...</div>
                    </div>

                    <!-- 区域列表 -->
                    <div id="admin-tab-regions" class="admin-tab-content hidden">
                        <h3 class="text-lg font-semibold mb-3">区域列表</h3>
                        <button id="refresh-regions-btn" class="mb-3 bg-indigo-100 text-indigo-700 px-3 py-1 rounded-md text-sm hover:bg-indigo-200">刷新区域</button>
                        <div id="regions-list" class="grid grid-cols-1 md:grid-cols-2 gap-3">加载中...</div>
                        <div class="mt-4 p-3 bg-gray-50 rounded-lg">
                            <h4 class="font-medium text-gray-700">新建区域（管理员）</h4>
                            <div class="flex gap-2 mt-2">
                                <input type="text" id="new-region-name" placeholder="区域名称（如 上海）" class="border rounded px-3 py-2 flex-1">
                                <button id="create-region-btn" class="bg-green-500 text-white px-4 py-2 rounded text-sm hover:bg-green-600">创建</button>
                            </div>
                        </div>
                    </div>

                    <!-- 上传栅格数据 -->
                    <div id="admin-tab-raster" class="admin-tab-content hidden">
                        <h3 class="text-lg font-semibold mb-3">上传栅格数据</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">选择文件</label>
                                <input type="file" id="raster-file" accept=".tif,.tiff,.nc,.grib" class="w-full border rounded-lg px-3 py-2 mt-1">
                                <p class="text-xs text-gray-500 mt-1">支持格式：.tif, .tiff, .nc, .grib</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">数据类型</label>
                                <select id="raster-data-type" class="w-full border rounded-lg px-3 py-2 mt-1">
                                    <option value="dem">DEM（数字高程模型）</option>
                                    <option value="temperature_grid">温度栅格</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">关联区域</label>
                                <select id="raster-region-id" class="w-full border rounded-lg px-3 py-2 mt-1">
                                    <option value="">请选择区域</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">自定义名称（可选）</label>
                                <input type="text" id="raster-name" placeholder="自动生成" class="w-full border rounded-lg px-3 py-2 mt-1">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">空间分辨率（可选）</label>
                                <input type="number" step="0.1" id="raster-resolution" placeholder="单位：米或度" class="w-full border rounded-lg px-3 py-2 mt-1">
                            </div>
                            <button id="upload-raster-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 rounded-lg">上传栅格数据</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== 右侧功能菜单 ===== -->
            <div class="w-full lg:w-56 flex-shrink-0">
                <div class="rounded-xl p-4 bg-white shadow-lg">
                    <h3 class="text-lg font-bold text-gray-700 text-center border-b border-gray-200 pb-3 mb-3">⚡ 功能菜单</h3>
                    <div class="flex flex-col gap-2.5">
                        <a href="weather_search.html" class="text-center bg-blue-500 hover:bg-blue-600 text-white font-medium py-2.5 px-3 rounded-lg transition-smooth shadow-sm text-sm">
                            🔍 气象数据检索
                        </a>
                        <a href="data_trend.html" class="text-center bg-blue-500 hover:bg-blue-600 text-white font-medium py-2.5 px-3 rounded-lg transition-smooth shadow-sm text-sm">
                            📈 数据趋势图
                        </a>
                        <a href="add_weather.html" class="text-center bg-blue-500 hover:bg-blue-600 text-white font-medium py-2.5 px-3 rounded-lg transition-smooth shadow-sm text-sm">
                            📊 添加气象数据
                        </a>
                        <a href="export_weather.html" class="text-center bg-blue-500 hover:bg-blue-600 text-white font-medium py-2.5 px-3 rounded-lg transition-smooth shadow-sm text-sm">
                            📤 导出气象数据
                        </a>
                        <a href="admin.html" id="admin-console-btn" class="text-center bg-blue-500 hover:bg-blue-600 text-white font-medium py-2.5 px-3 rounded-lg transition-smooth shadow-sm text-sm">
                            ⚙️ 管理员控制台
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        (async function() {
            const token = localStorage.getItem('access_token');
            const userStr = localStorage.getItem('user_info');
            if (!token || !userStr) {
                alert('请先登录');
                window.location.href = 'index.html';
                return;
            }

            const user = JSON.parse(userStr);
            if (user.role !== 'admin') {
                alert('仅管理员可访问此页面');
                window.location.href = 'index.html';
                return;
            }

            // ===== 标签页切换 =====
            document.querySelectorAll('.admin-tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.admin-tab-btn').forEach(b => {
                        b.classList.remove('active', 'text-blue-600', 'border-blue-600', 'bg-blue-50');
                        b.classList.add('text-gray-600', 'border-transparent');
                    });
                    this.classList.add('active', 'text-blue-600', 'border-blue-600', 'bg-blue-50');
                    this.classList.remove('text-gray-600', 'border-transparent');

                    document.querySelectorAll('.admin-tab-content').forEach(content => {
                        content.classList.add('hidden');
                    });
                    const targetContent = document.getElementById('admin-tab-' + this.dataset.tab);
                    if (targetContent) targetContent.classList.remove('hidden');
                });
            });

            // ===== 加载用户列表 =====
            async function loadUsers() {
                try {
                    const data = await apiService.getUsers();
                    if (data.data) uiService.renderUsersList(data.data);
                } catch (err) { uiService.showError(err.message); }
            }

            // ===== 加载区域列表 =====
            async function loadRegions() {
                try {
                    const data = await apiService.getRegions();
                    if (data.data) {
                        uiService.renderRegionsList(data.data);
                    }
                } catch (err) { uiService.showError(err.message); }
            }

            // ===== 加载栅格区域下拉 =====
            async function loadRasterRegionSelect() {
                try {
                    const data = await apiService.getRegions();
                    const select = document.getElementById('raster-region-id');
                    if (select) {
                        select.innerHTML = '<option value="">请选择区域</option>';
                        if (data.data && data.data.length) {
                            data.data.forEach(region => {
                                const opt = document.createElement('option');
                                opt.value = region.id;
                                opt.textContent = `${region.name} (${region.code || '无编码'})`;
                                select.appendChild(opt);
                            });
                        }
                    }
                } catch (err) { console.error('加载区域列表失败', err); }
            }

            // ===== 事件绑定 =====
            document.getElementById('refresh-users-btn').addEventListener('click', loadUsers);
            document.getElementById('refresh-regions-btn').addEventListener('click', async () => {
                await loadRegions();
                await loadRasterRegionSelect();
            });

            document.getElementById('create-region-btn').addEventListener('click', async () => {
                const name = document.getElementById('new-region-name').value.trim();
                if (!name) { uiService.showError('请输入区域名称'); return; }
                try {
                    await apiService.createRegion(name);
                    uiService.showSuccess(`区域 "${name}" 创建成功`);
                    document.getElementById('new-region-name').value = '';
                    await loadRegions();
                    await loadRasterRegionSelect();
                } catch (err) { uiService.showError(err.message); }
            });

            document.getElementById('upload-raster-btn').addEventListener('click', async () => {
                const fileInput = document.getElementById('raster-file');
                const file = fileInput.files[0];
                if (!file) { uiService.showError('请选择文件'); return; }
                const dataType = document.getElementById('raster-data-type').value;
                const regionId = document.getElementById('raster-region-id').value;
                if (!regionId) { uiService.showError('请选择关联区域'); return; }
                const name = document.getElementById('raster-name').value.trim();
                const resolution = document.getElementById('raster-resolution').value;
                try {
                    await apiService.uploadRaster(file, dataType, parseInt(regionId), name, resolution ? parseFloat(resolution) : null);
                    uiService.showSuccess('栅格数据上传成功');
                    fileInput.value = '';
                    document.getElementById('raster-name').value = '';
                    document.getElementById('raster-resolution').value = '';
                } catch (err) { uiService.showError(err.message); }
            });

            // ===== 初始加载 =====
            await loadUsers();
            await loadRegions();
            await loadRasterRegionSelect();
        })();
    </script>
</body>
</html>
