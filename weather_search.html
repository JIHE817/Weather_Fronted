<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>气象数据检索 - 区域气象监测系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
        .transition-smooth { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body>
    <div class="container">
        <div class="flex flex-col lg:flex-row gap-6">
            <!-- ===== 左侧主内容 ===== -->
            <div class="flex-1">
                <div class="bg-white rounded-xl shadow-md p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">气象数据检索</h1>
                        <a href="index.html" class="text-blue-600 hover:underline">← 返回首页</a>
                    </div>

                    <div id="error-message" class="mb-4"></div>
                    <div id="success-message" class="mb-4"></div>

                    <!-- 检索条件 -->
                    <div class="bg-gray-50 rounded-lg p-4 mb-6">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">监测区域</label>
                                <select id="region-select" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                                    <option value="">加载中...</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">起始时间</label>
                                <input type="date" id="start-time" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">结束时间</label>
                                <input type="date" id="end-time" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                            </div>
                            <div>
                                <button id="search-weather" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg flex items-center justify-center">
                                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                    查询
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 气象记录表格 -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-6">
                        <h2 class="text-lg font-semibold text-gray-800 mb-3">气象记录列表</h2>
                        <div id="weather-table-container" class="overflow-x-auto">
                            <div class="text-center text-gray-400 py-8">请选择区域并点击查询</div>
                        </div>
                    </div>

                    <!-- 温度变化趋势图 -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
                        <h2 class="text-lg font-semibold text-gray-800 mb-3">温度变化趋势图</h2>
                        <canvas id="temperature-chart" width="800" height="300" style="width:100%; height:auto; max-height:320px" class="border rounded-lg bg-gray-50"></canvas>
                    </div>
                </div>
            </div>

            <!-- ===== 右侧功能菜单 ===== -->
            <div class="w-full lg:w-56 flex-shrink-0">
                <div class="rounded-xl p-4 bg-white shadow-lg">
                    <h3 class="text-lg font-bold text-gray-700 text-center border-b border-gray-200 pb-3 mb-3">⚡ 功能菜单</h3>
                    <div class="flex flex-col gap-2.5">
                        <a href="weather_search.html" class="text-center bg-blue-500 hover:bg-blue-600 text-white font-medium py-2.5 px-3 rounded-lg transition-smooth shadow-sm text-sm">
                            🔍 气象数据检索
                        </a>
                        <a href="data_trend.html" class="text-center bg-blue-500 hover:bg-blue-600 text-white font-medium py-2.5 px-3 rounded-lg transition-smooth shadow-sm text-sm">
                            📈 数据趋势图
                        </a>
                        <a href="add_weather.html" class="text-center bg-blue-500 hover:bg-blue-600 text-white font-medium py-2.5 px-3 rounded-lg transition-smooth shadow-sm text-sm">
                            📊 添加气象数据
                        </a>
                        <a href="export_weather.html" class="text-center bg-blue-500 hover:bg-blue-600 text-white font-medium py-2.5 px-3 rounded-lg transition-smooth shadow-sm text-sm">
                            📤 导出气象数据
                        </a>
                        <a href="admin.html" id="admin-console-btn" class="text-center bg-blue-500 hover:bg-blue-600 text-white font-medium py-2.5 px-3 rounded-lg transition-smooth shadow-sm text-sm">
                            ⚙️ 管理员控制台
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        (async function() {
            const token = localStorage.getItem('access_token');
            const user = localStorage.getItem('user_info');
            if (!token || !user) {
                alert('请先登录');
                window.location.href = 'index.html';
                return;
            }

            // 根据用户角色显示/隐藏管理员按钮
            try {
                const userData = JSON.parse(user);
                const adminBtn = document.getElementById('admin-console-btn');
                if (adminBtn) {
                    if (userData.role === 'admin') {
                        adminBtn.classList.remove('hidden');
                    } else {
                        adminBtn.classList.add('hidden');
                    }
                }
            } catch(e) {}

            // 加载区域列表
            async function loadRegions() {
                try {
                    const data = await apiService.getRegions();
                    const select = document.getElementById('region-select');
                    select.innerHTML = '<option value="">请选择区域</option>';
                    if (data.data && data.data.length) {
                        data.data.forEach(region => {
                            const opt = document.createElement('option');
                            opt.value = region.id;
                            opt.textContent = `${region.name} (${region.code || '无编码'})`;
                            select.appendChild(opt);
                        });
                    }
                } catch (err) {
                    uiService.showError('加载区域失败：' + err.message);
                }
            }

            await loadRegions();

            // 查询按钮
            document.getElementById('search-weather').addEventListener('click', async () => {
                const regionId = document.getElementById('region-select').value;
                if (!regionId) {
                    uiService.showError('请选择区域');
                    return;
                }
                const start = document.getElementById('start-time').value;
                const end = document.getElementById('end-time').value;

                document.getElementById('weather-table-container').innerHTML = '<div class="text-center py-8 text-gray-400">查询中...</div>';
                try {
                    const result = await apiService.getWeatherData({
                        region_id: regionId,
                        start_time: start,
                        end_time: end
                    });

                    if (result.data && result.data.length) {
                        result.data.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                        uiService.renderWeatherTable(result.data, 'weather-table-container');
                        const temps = result.data.map(d => d.temperature).filter(t => t !== null && t !== undefined);
                        if (temps.length) {
                            uiService.drawTemperatureChart('temperature-chart', temps);
                        } else {
                            uiService.drawTemperatureChart('temperature-chart', []);
                        }
                        uiService.showSuccess(`查询完成，共 ${result.data.length} 条记录`);
                    } else {
                        uiService.renderWeatherTable([], 'weather-table-container');
                        uiService.drawTemperatureChart('temperature-chart', []);
                        uiService.showError('所选时间段内无数据');
                    }
                } catch (err) {
                    uiService.showError(err.message);
                    uiService.renderWeatherTable([], 'weather-table-container');
                }
            });
        })();
    </script>
</body>
</html>
